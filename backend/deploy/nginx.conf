# =============================================================================
# MeetingMind — Nginx Reverse Proxy Configuration
# =============================================================================
# Place this file at: /etc/nginx/sites-available/meetingmind
# Then run: sudo ln -s /etc/nginx/sites-available/meetingmind /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    listen 80;
    server_name your-domain.com;  # ← Replace with your actual domain or IP

    # ── API Proxy ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for long audio processing requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Increase max body size for audio uploads (500MB)
        client_max_body_size 500M;
    }

    # ── WebSocket Support (if needed for live streaming) ──────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}

