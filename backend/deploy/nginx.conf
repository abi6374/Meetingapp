server {
    listen 80;
    server_name _; # Replace with your domain if available

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Respect the protocol from CloudFront (HTTPS) instead of the local connection (HTTP)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Port $http_x_forwarded_port;

        # CRITICAL: Allow large meeting audio uploads
        client_max_body_size 100M;
        
        # Increase timeouts for long AI transcription tasks
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }
}
