# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────
# Copy this file and fill in the values you want to use.
# On Streamlit Community Cloud, add these in:
#   App Settings → Secrets
# ─────────────────────────────────────────────────────────────

# ── Ollama (local or cloud-hosted) ───────────────────────────
# Local default:  http://localhost:11434
# Cloud example:  https://your-ollama.ngrok.io
#                 https://your-ollama.railway.app
OLLAMA_URL = "http://localhost:11434"

# ── Groq (free cloud API) ────────────────────────────────────
# Get key at: https://console.groq.com/keys
GROQ_API_KEY = ""

# ── Google Gemini (free tier available) ──────────────────────
# Get key at: https://aistudio.google.com/app/apikey
GEMINI_API_KEY = ""
